<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Project: Director UI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; margin: 0; display: flex; gap: 20px; }
        .panel { background-color: #1e1e1e; padding: 20px; border-radius: 10px; flex: 1; border: 1px solid #333; }
        h1, h2, h3 { color: #bb86fc; margin-top: 0; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #03dac6; }
        textarea, input[type="text"] { width: 100%; padding: 10px; background-color: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #03dac6; color: #121212; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        button:hover { background-color: #03a89e; }
        button.stop { background-color: #cf6679; }
        .action-btn { background-color: #ff9800; font-size: 1.2em; padding: 15px; }
        .action-btn:hover { background-color: #f57c00; }
        .log-box { height: 250px; background-color: #000; overflow-y: auto; padding: 10px; font-family: monospace; border-radius: 5px; font-size: 0.85em; }
        #videoContainer { background: #000; height: 320px; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        audio { width: 100%; margin-top: 10px; outline: none; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; margin-bottom: 10px; }
        .badge.off { background: #555; }
        .badge.on { background: #4caf50; color: white; }
    </style>
</head>
<body>

    <div class="panel" style="flex: 2;">
        <h2>📺 The Broadcast Feed</h2>
        <div id="videoContainer">
            <span id="video-placeholder" style="position: absolute;">Ready to connect...</span>
            <video id="remoteVideo" autoplay playsinline muted></video>
        </div>
        <div class="control-group" style="margin-top: 15px; display: flex; gap: 10px;">
            <button id="connectBtn" onclick="connectStream()">1. Connect GPU Video</button>
            <button id="startLiveBtn" onclick="startLiveApi()">2. Connect Gemini Voice</button>
        </div>
        <div>
            <span id="badgeVideo" class="badge off">Video: Disconnected</span>
            <span id="badgeVoice" class="badge off">Voice: Disconnected</span>
        </div>

        <h2>🎙️ Voiceover Persona</h2>
        <div class="control-group">
            <textarea id="sysInstruct" rows="2">You are a dramatic narrator. Speak short, punchy, cinematic narration for a scene. Do not output text, only speak.</textarea>
        </div>
        
        <h2>🎵 Adaptive Music</h2>
        <div class="control-group">
            <label>Current Music Track:</label>
            <audio id="musicPlayer" controls loop crossorigin="anonymous"></audio>
            <div style="margin-top: 10px; display: flex; gap: 10px; align-items: center;">
                <label style="margin: 0;">Music Vol:</label>
                <input type="range" id="musicVolSlider" min="0" max="1" step="0.1" value="1.0" onchange="updateVolumes()">
                <label style="margin: 0; margin-left: 15px;">Music Duck Vol:</label>
                <input type="range" id="musicDuckSlider" min="0" max="1" step="0.1" value="0.2" onchange="updateVolumes()">
                <label style="margin: 0; margin-left: 15px;">Voice Vol:</label>
                <input type="range" id="voiceVolSlider" min="0" max="1" step="0.1" value="1.0" onchange="updateVolumes()">
            </div>
            <div style="font-size: 0.8em; color: #888; margin-top: 5px;">(Music volume automatically ducks to the specified level when voiceover plays)</div>
        </div>
    </div>

    <div class="panel" style="flex: 1;">
        <h2>🎬 The Director Engine</h2>
        <div class="control-group">
            <label>Narrative Seed (few words):</label>
            <input type="text" id="seedInput" placeholder="Cyberpunk detective finds a clue">
            <button class="action-btn" onclick="expandAndExecute()">ACTION! 🎥</button>
        </div>

        <div class="control-group">
            <label>Generated Video Prompt (MemFlow):</label>
            <textarea id="videoPromptDisplay" rows="4" readonly></textarea>
        </div>

        <div class="control-group">
            <label>System Logs:</label>
            <div id="sysLog" class="log-box"></div>
        </div>
    </div>

    <script>
        const SCOPE_API_BASE = '';
        let peerConnection;
        let dataChannel;
        let liveWs;
        let audioContext;
        
        // Audio routing for Ducking
        let musicElementSource;
        let musicGainNode;
        let voiceGainNode;

        let baseMusicVol = 1.0;
        let duckMusicVol = 0.2;
        let baseVoiceVol = 1.0;
        let isMusicDucked = false;

        function updateVolumes() {
            baseMusicVol = parseFloat(document.getElementById('musicVolSlider').value);
            duckMusicVol = parseFloat(document.getElementById('musicDuckSlider').value);
            baseVoiceVol = parseFloat(document.getElementById('voiceVolSlider').value);
            
            if (voiceGainNode) {
                voiceGainNode.gain.setTargetAtTime(baseVoiceVol, audioContext.currentTime, 0.1);
            }
            if (musicGainNode) {
                musicGainNode.gain.setTargetAtTime(isMusicDucked ? duckMusicVol : baseMusicVol, audioContext.currentTime, 0.1);
            }
            log(`Levels updated: Music=${baseMusicVol}, Duck=${duckMusicVol}, Voice=${baseVoiceVol}`);
        }

        function log(msg) {
            const div = document.createElement('div');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('sysLog').prepend(div);
        }

        // --- 1. Audio Setup & Ducking ---
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                const player = document.getElementById('musicPlayer');
                musicElementSource = audioContext.createMediaElementSource(player);
                
                musicGainNode = audioContext.createGain();
                voiceGainNode = audioContext.createGain();
                
                // Read initial values from sliders
                baseMusicVol = parseFloat(document.getElementById('musicVolSlider').value);
                duckMusicVol = parseFloat(document.getElementById('musicDuckSlider').value);
                baseVoiceVol = parseFloat(document.getElementById('voiceVolSlider').value);

                musicGainNode.gain.value = baseMusicVol;
                voiceGainNode.gain.value = baseVoiceVol;
                
                musicElementSource.connect(musicGainNode);
                musicGainNode.connect(audioContext.destination);
                voiceGainNode.connect(audioContext.destination);

                log("Audio routing initialized.");
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        function duckMusic(duck) {
            if (musicGainNode) {
                isMusicDucked = duck;
                const targetVol = duck ? duckMusicVol : baseMusicVol;
                musicGainNode.gain.setTargetAtTime(targetVol, audioContext.currentTime, 0.5);
            }
        }

        // --- 2. WebRTC Video Stream Setup ---
        async function connectStream() {
            log("Starting Video WebRTC...");
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('connectBtn').innerText = "Connecting...";
            peerConnection = new RTCPeerConnection({ iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ] });
            
            peerConnection.onconnectionstatechange = () => log("WebRTC State: " + peerConnection.connectionState);
            peerConnection.ontrack = (event) => {
                const vid = document.getElementById('remoteVideo');
                vid.srcObject = event.streams[0];
                vid.play().catch(e => log("⚠️ Video Autoplay Blocked: " + e.message));
                document.getElementById('video-placeholder').style.display = 'none';
                document.getElementById('badgeVideo').className = 'badge on';
                document.getElementById('badgeVideo').innerText = 'Video: Connected';
                log("✅ Video Stream Connected!");
                document.getElementById('connectBtn').innerText = "Connected";
            };
            
            dataChannel = peerConnection.createDataChannel("parameters", {ordered: true});
            dataChannel.onopen = () => log("✅ Video Data Channel Open!");
            dataChannel.onerror = (e) => log("❌ Data Channel Error!");
            peerConnection.addTransceiver('video', { direction: 'sendrecv' });
            peerConnection.addTransceiver('audio', { direction: 'recvonly' });

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await new Promise(r => {
                if (peerConnection.iceGatheringState === 'complete') return r();
                const check = () => { if (peerConnection.iceGatheringState === 'complete') { peerConnection.removeEventListener('icegatheringstatechange', check); r(); } };
                peerConnection.addEventListener('icegatheringstatechange', check);
                setTimeout(r, 2000);
            });

            // We use the current params, defaulting to something standard if not set
            const initialParams = {
                pipeline_ids: ["memflow"], input_mode: "text",
                prompts: [{ text: "A breathtaking wide angle cinematic landscape, extremely detailed, 8k resolution", weight: 100.0 }],
                recording: false, vace_enabled: false
            };

            // Fix API payload wrapper logic to match backend expectations exactly
            const payload = {
                sdp: peerConnection.localDescription.sdp,
                type: 'offer',
                initialParameters: initialParams
            };

            try {
                const response = await fetch(`${SCOPE_API_BASE}/api/v1/webrtc/offer`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const answer = await response.json();
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                
                // Add fallback to unpause generation via Data Channel just in case
                setTimeout(() => {
                    if (dataChannel && dataChannel.readyState === 'open') {
                        dataChannel.send(JSON.stringify({ 
                            prompt: initialParams.prompts[0].text,
                            prompts: initialParams.prompts,
                            paused: false
                        }));
                        log("✅ Sent stream initialization signal.");
                    }
                }, 1000);
            } catch (e) {
                log("❌ Video WebRTC Error: " + e.message);
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('connectBtn').innerText = "1. Connect GPU Video";
            }
        }

        // --- 3. Gemini Live API Setup (WebSocket) ---
        async function startLiveApi() {
            initAudio();
            log("Connecting to Gemini Live API...");
            document.getElementById('startLiveBtn').disabled = true;
            document.getElementById('startLiveBtn').innerText = "Connecting Voice...";
            
            try {
                const res = await fetch('/api/get-gemini-token');
                const data = await res.json();
                
                const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${data.api_key}`;
                liveWs = new WebSocket(wsUrl);

                liveWs.onopen = () => {
                    log("✅ Gemini Live Voice Connected!");
                    document.getElementById('badgeVoice').className = 'badge on';
                    document.getElementById('badgeVoice').innerText = 'Voice: Connected';
                    document.getElementById('startLiveBtn').innerText = "Voice Connected";
                    
                    const setupMsg = {
                        setup: {
                            model: "models/gemini-2.5-flash-native-audio-latest",
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } }
                            },
                            systemInstruction: { parts: [{ text: document.getElementById('sysInstruct').value }] }
                        }
                    };
                    liveWs.send(JSON.stringify(setupMsg));
                };

                let playbackQueue = [];
                let nextStartTime = 0;
                let isDucking = false;

                async function processPlaybackQueue() {
                    if (playbackQueue.length === 0) return;
                    
                    if (!isDucking) {
                        duckMusic(true);
                        isDucking = true;
                    }

                    try {
                        const base64Data = playbackQueue.shift();
                        const binaryString = window.atob(base64Data);
                        const len = binaryString.length;
                        const validLen = len % 2 === 0 ? len : len - 1;
                        const bytes = new Uint8Array(validLen);
                        for (let i = 0; i < validLen; i++) { bytes[i] = binaryString.charCodeAt(i); }
                        
                        const int16Array = new Int16Array(bytes.buffer);
                        
                        const audioBuffer = audioContext.createBuffer(1, int16Array.length, 24000);
                        const channelData = audioBuffer.getChannelData(0);
                        for (let i = 0; i < int16Array.length; i++) { channelData[i] = int16Array[i] / 32768.0; }
                        
                        const source = audioContext.createBufferSource();
                        source.buffer = audioBuffer;
                        source.connect(voiceGainNode);
                        
                        if (nextStartTime < audioContext.currentTime) {
                            nextStartTime = audioContext.currentTime + 0.05; // 50ms buffer to prevent stutter
                        }
                        
                        source.start(nextStartTime);
                        nextStartTime += audioBuffer.duration;
                        
                        source.onended = () => {
                            // If we've reached the end of all scheduled audio, restore music
                            if (playbackQueue.length === 0 && audioContext.currentTime >= nextStartTime - 0.1) {
                                duckMusic(false);
                                isDucking = false;
                            }
                        };
                        
                        // Process the next chunk immediately to keep the pipeline full
                        processPlaybackQueue();
                    } catch (err) {
                        console.error("Playback error:", err);
                        log("❌ Audio Playback Error: " + err.message);
                        duckMusic(false);
                        isDucking = false;
                    }
                }

                liveWs.onmessage = async (evt) => {
                    let msgText = evt.data;
                    if (evt.data instanceof Blob) {
                        msgText = await evt.data.text();
                    }
                    try {
                        const msg = JSON.parse(msgText);
                        
                        if (msg.serverContent && msg.serverContent.modelTurn) {
                            const parts = msg.serverContent.modelTurn.parts;
                            for (let p of parts) {
                                if (p.inlineData && p.inlineData.data) {
                                    playbackQueue.push(p.inlineData.data);
                                    processPlaybackQueue();
                                }
                            }
                        }
                    } catch(e) {
                        console.error("Error parsing voice message", e);
                    }
                };

                liveWs.onclose = () => {
                    log("Voice WebSocket disconnected.");
                    document.getElementById('startLiveBtn').disabled = false;
                    document.getElementById('startLiveBtn').innerText = "2. Connect Gemini Voice";
                    document.getElementById('badgeVoice').className = 'badge off';
                    document.getElementById('badgeVoice').innerText = 'Voice: Disconnected';
                    duckMusic(false);
                };
            } catch (e) { 
                log("❌ Live API Error: " + e); 
                document.getElementById('startLiveBtn').disabled = false;
                document.getElementById('startLiveBtn').innerText = "2. Connect Gemini Voice";
            }
        }

        // --- 4. Lyria Music API Setup (WebSocket) ---
        let lyriaWs;
        let musicNextStartTime = 0;
        
        async function startLyriaApi(promptText) {
            initAudio();
            log("Connecting to Lyria Music API...");
            try {
                const res = await fetch('/api/get-gemini-token');
                const data = await res.json();
                
                const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateMusic?key=${data.api_key}`;
                if (lyriaWs) lyriaWs.close();
                
                lyriaWs = new WebSocket(wsUrl);

                lyriaWs.onopen = () => {
                    log("✅ Lyria Music Connected! Requesting: " + promptText);
                    const setupMsg = { setup: { model: "models/lyria-realtime-exp" } };
                    lyriaWs.send(JSON.stringify(setupMsg));
                };

                let musicQueue = [];
                let isProcessingMusic = false;

                async function processMusicQueue() {
                    if (isProcessingMusic || musicQueue.length === 0) return;
                    isProcessingMusic = true;

                    try {
                        const base64Data = musicQueue.shift();
                        const binaryString = window.atob(base64Data);
                        const len = binaryString.length;
                        const validLen = len % 2 === 0 ? len : len - 1;
                        const bytes = new Uint8Array(validLen);
                        for (let i = 0; i < validLen; i++) { bytes[i] = binaryString.charCodeAt(i); }
                        
                        const int16Array = new Int16Array(bytes.buffer);
                        // Lyria Realtime uses 48000Hz PCM
                        const audioBuffer = audioContext.createBuffer(1, int16Array.length, 48000);
                        const channelData = audioBuffer.getChannelData(0);
                        for (let i = 0; i < int16Array.length; i++) { channelData[i] = int16Array[i] / 32768.0; }
                        
                        const source = audioContext.createBufferSource();
                        source.buffer = audioBuffer;
                        
                        // Connect to musicGainNode so it ducks when voiceover speaks
                        source.connect(musicGainNode);
                        
                        if (musicNextStartTime < audioContext.currentTime) {
                            musicNextStartTime = audioContext.currentTime + 0.1;
                        }
                        
                        source.start(musicNextStartTime);
                        musicNextStartTime += audioBuffer.duration;
                        
                        source.onended = () => {
                            isProcessingMusic = false;
                            processMusicQueue();
                        };
                        
                        // Do not immediately recurse, wait for onended or timeout to prevent buffer overload?
                        // Actually, WebAudio handles scheduled sources well, but to avoid memory bloat, we process next immediately.
                        isProcessingMusic = false;
                        processMusicQueue();
                    } catch (err) {
                        console.error("Music playback error:", err);
                        isProcessingMusic = false;
                    }
                }

                lyriaWs.onmessage = async (evt) => {
                    let msgText = evt.data;
                    if (evt.data instanceof Blob) {
                        msgText = await evt.data.text();
                    }
                    try {
                        const msg = JSON.parse(msgText);
                    
                        if (msg.setupComplete) {
                        // For BidiGenerateMusic (Lyria), the message structure is different.
                        // Wait, looking at the python code:
                        // `clientContent: { weightedPrompts: [...] }`
                        // `musicGenerationConfig: { ... }`
                        // Let's try sending as separate wrapper objects or a single client content?
                        // The python library sends:
                        // `{"clientContent": {"weightedPrompts": [{"text": promptText, "weight": 1.0}]}}`
                        // `{"musicGenerationConfig": {"temperature": 1.0, "bpm": 90}}`
                        // `{"playbackControl": "PLAY"}`
                        lyriaWs.send(JSON.stringify({ clientContent: { weightedPrompts: [{ text: promptText, "weight": 1.0 }] } }));
                        lyriaWs.send(JSON.stringify({ musicGenerationConfig: { temperature: 1.0, bpm: 90 } }));
                        lyriaWs.send(JSON.stringify({ playbackControl: "PLAY" }));
                    }
                    
                    if (msg.serverContent && msg.serverContent.audioChunks) {
                        for (let chunk of msg.serverContent.audioChunks) {
                            if (chunk.data) {
                                musicQueue.push(chunk.data);
                                processMusicQueue();
                            }
                        }
                    }
                    } catch(e) {
                        console.error("Error parsing Lyria message:", e);
                    }
                };

                lyriaWs.onclose = () => {
                    log("Lyria WebSocket disconnected.");
                };
            } catch (e) { 
                log("❌ Lyria API Error: " + e); 
            }
        }

        // --- 5. Director Orchestrator ---
        let currentSceneContext = "";
        
        async function expandAndExecute() {
            initAudio();
            const seed = document.getElementById('seedInput').value || "Cyberpunk detective finds a clue";
            log(`🎬 DIRECTOR ACTION CALLED: "${seed}"`);
            
            // 1. Expand Prompt via Gemini with Context Awareness
            log("🧠 Director LLM evaluating scene continuation vs new scene...");
            let expandedVid = "";
            let isNewScene = true;
            try {
                const expandRes = await fetch('/api/expand-prompt', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ seed: seed, previous_context: currentSceneContext })
                });
                const expandData = await expandRes.json();
                expandedVid = expandData.expanded;
                isNewScene = expandData.is_new_scene;
                currentSceneContext = expandedVid; // Store for next turn
                
                document.getElementById('videoPromptDisplay').value = expandedVid;
                log(`✅ Prompt expanded: ${expandedVid.substring(0, 50)}...`);
                log(`🔄 Scene Analysis: ${isNewScene ? "HARD CUT (New Scene)" : "CONTINUATION (Same Scene)"}`);
                
                // 2. Send to Video GPU
                if(dataChannel && dataChannel.readyState === 'open') {
                    if (isNewScene) {
                        // Send clear cache first to enforce scene break
                        dataChannel.send(JSON.stringify({ reset_cache: true }));
                        log("🧹 VACE Cache Cleared for new scene.");
                    }
                    // Send the new prompt
                    dataChannel.send(JSON.stringify({ prompt: expandedVid, prompts: [{text: expandedVid, weight: 100.0}] }));
                    log("🎥 Sent prompt to GPU Video Engine.");
                } else {
                    log("⚠️ GPU Video Engine not connected! Prompt not sent.");
                }

            } catch (e) {
                log("❌ Director LLM Error: " + e.message);
                expandedVid = seed; // Fallback
            }

            // 3. Trigger Music (Only change music if it's a new scene)
            if (isNewScene) {
                log("🎵 Fetching new background music from Lyria...");
                const player = document.getElementById('musicPlayer');
                if (player) player.pause();
                startLyriaApi("cinematic underscore: " + seed);
            } else {
                log("🎵 Keeping current music track for scene continuation.");
            }

            // 4. Trigger Voiceover Narration
            const triggerVoice = () => {
                const narrationInstruction = isNewScene ? 
                    `A brand new scene begins: ${seed}. Narrate this dramatically.` : 
                    `Continuing the current scene: ${seed}. Narrate the next action.`;
                    
                const clientContent = {
                    clientContent: { turns: [{ role: "user", parts: [{ text: narrationInstruction }] }], turnComplete: true }
                };
                liveWs.send(JSON.stringify(clientContent));
                log("🎙️ Requested Live Voiceover narration.");
            };

            if(liveWs && liveWs.readyState === WebSocket.OPEN) {
                triggerVoice();
            } else { 
                log("⚠️ Live Voice Engine not connected! Auto-connecting now...");
                await startLiveApi();
                // Wait for connection to establish before sending prompt
                let retries = 0;
                const checkWs = setInterval(() => {
                    if (liveWs && liveWs.readyState === WebSocket.OPEN) {
                        clearInterval(checkWs);
                        setTimeout(triggerVoice, 1000); // Give it a second to send setup
                    }
                    if (++retries > 20) {
                        clearInterval(checkWs);
                        log("❌ Voiceover auto-connect timed out.");
                    }
                }, 500);
            }
        }
    </script>
</body>
</html>
