<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Project: Director UI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; margin: 0; display: flex; gap: 20px; }
        .panel { background-color: #1e1e1e; padding: 20px; border-radius: 10px; flex: 1; border: 1px solid #333; }
        h1, h2, h3 { color: #bb86fc; margin-top: 0; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #03dac6; }
        textarea, input[type="text"] { width: 100%; padding: 10px; background-color: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #03dac6; color: #121212; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        button:hover { background-color: #03a89e; }
        button.stop { background-color: #cf6679; }
        .log-box { height: 200px; background-color: #000; overflow-y: auto; padding: 10px; font-family: monospace; border-radius: 5px; font-size: 0.9em; }
        #videoContainer { background: #000; height: 320px; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        audio { width: 100%; margin-top: 10px; outline: none; }
    </style>
</head>
<body>

    <div class="panel" style="flex: 2;">
        <h2>📺 Video Stream (MemFlow + RIFE)</h2>
        <div id="videoContainer">
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        <div class="control-group" style="margin-top: 15px;">
            <button id="connectBtn" onclick="connectStream()">1. Connect Video Stream</button>
        </div>

        <h2>🎙️ Live Voiceover (Gemini Live API)</h2>
        <div class="control-group">
            <label>System Instructions (Director Persona):</label>
            <textarea id="sysInstruct" rows="3">You are a dramatic narrator. Speak short, punchy, cinematic narration for a 60-second clip. Do not output text, only speak.</textarea>
        </div>
        <div class="control-group">
            <button id="startLiveBtn" onclick="startLiveApi()">2. Connect Gemini Live Voice</button>
            <button id="stopLiveBtn" class="stop" onclick="stopLiveApi()" disabled>Stop Voice</button>
        </div>
        
        <h2>🎵 Adaptive Music (Gemini Music API)</h2>
        <div class="control-group">
            <label>Music Prompt:</label>
            <input type="text" id="musicPrompt" placeholder="Epic cyberpunk synthwave, driving beat, 120 bpm">
            <button id="genMusicBtn" onclick="generateMusic()">3. Generate & Play Music</button>
            <audio id="musicPlayer" controls loop></audio>
        </div>
    </div>

    <div class="panel" style="flex: 1;">
        <h2>🎬 The Director Engine</h2>
        <div class="control-group">
            <label>Narrative Seed (few words):</label>
            <input type="text" id="seedInput" placeholder="Cyberpunk detective finds a clue">
            <button onclick="expandAndExecute()">Action! (Expand & Send to all engines)</button>
        </div>

        <div class="control-group">
            <label>Current Video Prompt (Auto-Expanded):</label>
            <textarea id="videoPromptDisplay" rows="4" readonly></textarea>
            <button onclick="sendVideoPromptManual()">Send Video Prompt Manual</button>
        </div>

        <div class="control-group">
            <label>System Logs:</label>
            <div id="sysLog" class="log-box"></div>
        </div>
    </div>

    <script>
        const SCOPE_API_BASE = '';
        let peerConnection;
        let dataChannel;
        let liveWs;
        let audioContext;
        
        function log(msg) {
            const div = document.createElement('div');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('sysLog').prepend(div);
        }

        // 1. WebRTC Video Stream Setup
        async function connectStream() {
            log("Starting Video WebRTC...");
            document.getElementById('connectBtn').disabled = true;
            peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            
            peerConnection.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
                log("Video Stream Connected!");
            };
            
            peerConnection.addTransceiver('video', { direction: 'recvonly' });
            dataChannel = peerConnection.createDataChannel("parameters", {ordered: true});
            dataChannel.onopen = () => log("Video Data Channel Open!");

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await new Promise(r => {
                if (peerConnection.iceGatheringState === 'complete') r();
                else {
                    const check = () => { if (peerConnection.iceGatheringState === 'complete') { peerConnection.removeEventListener('icegatheringstatechange', check); r(); } };
                    peerConnection.addEventListener('icegatheringstatechange', check);
                    setTimeout(r, 2000);
                }
            });

            const initialParams = {
                pipeline_ids: ["memflow", "rife"], input_mode: "text",
                prompts: [{ text: "A breathtaking wide angle cinematic landscape, extremely detailed, 8k resolution, wide field of view", weight: 100.0 }],
                recording: false, vace_enabled: true
            };

            const response = await fetch(`${SCOPE_API_BASE}/api/v1/webrtc/offer`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ sdp: peerConnection.localDescription.sdp, type: 'offer', initialParameters: initialParams })
            });
            const answer = await response.json();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        }

        function sendVideoPromptManual() {
            const text = document.getElementById('videoPromptDisplay').value;
            if(dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(JSON.stringify({ prompt: text, prompts: [{text: text, weight: 100.0}] }));
                log("Sent Video Prompt!");
            } else {
                log("Data channel not ready!");
            }
        }

        // 2. Gemini Live API Setup (WebSocket)
        async function startLiveApi() {
            log("Connecting to Gemini Live API...");
            try {
                const res = await fetch('/api/get-gemini-token');
                const data = await res.json();
                
                // Using gemini-2.0-flash-exp or similar for Live API
                const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${data.api_key}`;
                liveWs = new WebSocket(wsUrl);

                liveWs.onopen = () => {
                    log("Gemini Live Connected!");
                    document.getElementById('startLiveBtn').disabled = true;
                    document.getElementById('stopLiveBtn').disabled = false;
                    
                    // Send initial Setup message
                    const setupMsg = {
                        setup: {
                            model: "models/gemini-2.0-flash-exp",
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } }
                            },
                            systemInstruction: { parts: [{ text: document.getElementById('sysInstruct').value }] }
                        }
                    };
                    liveWs.send(JSON.stringify(setupMsg));
                    
                    // Start audio playback context
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                };

                liveWs.onmessage = async (evt) => {
                    if (evt.data instanceof Blob) {
                        const buffer = await evt.data.arrayBuffer();
                        // Real implementation requires parsing the base64 audio chunks from JSON,
                        // BidiGenerateContent sends JSON messages with base64 PCM audio.
                    } else {
                        const msg = JSON.parse(evt.data);
                        if (msg.serverContent && msg.serverContent.modelTurn) {
                            const parts = msg.serverContent.modelTurn.parts;
                            for (let p of parts) {
                                if (p.inlineData && p.inlineData.data) {
                                    // Play PCM audio chunk
                                    playPcmAudio(p.inlineData.data);
                                }
                            }
                        }
                    }
                };
            } catch (e) { log("Live API Error: " + e); }
        }

        async function playPcmAudio(base64Data) {
            const binaryString = window.atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
            const int16Array = new Int16Array(bytes.buffer);
            
            const audioBuffer = audioContext.createBuffer(1, int16Array.length, 24000);
            const channelData = audioBuffer.getChannelData(0);
            for (let i = 0; i < int16Array.length; i++) { channelData[i] = int16Array[i] / 32768.0; }
            
            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioContext.destination);
            source.start();
        }

        function stopLiveApi() {
            if(liveWs) liveWs.close();
            log("Live Voice Stopped.");
            document.getElementById('startLiveBtn').disabled = false;
            document.getElementById('stopLiveBtn').disabled = true;
        }

        // 3. Music Generation API
        async function generateMusic() {
            const prompt = document.getElementById('musicPrompt').value;
            log("Generating Music: " + prompt);
            try {
                const res = await fetch('/api/generate-music', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt })
                });
                const data = await res.json();
                if(data.audio_url) {
                    const player = document.getElementById('musicPlayer');
                    player.src = data.audio_url;
                    player.play();
                    log("Music playing.");
                } else { log("Music generation failed."); }
            } catch(e) { log("Music error: " + e); }
        }

        // 4. Director Orchestrator
        async function expandAndExecute() {
            const seed = document.getElementById('seedInput').value;
            log(`Director Action: "${seed}"`);
            
            // 1. Expand Video Prompt (mocked for speed, could call gemini)
            const expandedVid = `${seed}, highly detailed, cinematic lighting, 8k resolution, wide angle tracking shot, photorealistic`;
            document.getElementById('videoPromptDisplay').value = expandedVid;
            sendVideoPromptManual();

            // 2. Trigger Voiceover via Live API
            if(liveWs && liveWs.readyState === WebSocket.OPEN) {
                const clientContent = {
                    clientContent: { turns: [{ role: "user", parts: [{ text: `Narrate this scene dramatically: ${seed}` }] }] }
                };
                liveWs.send(JSON.stringify(clientContent));
                log("Prompted Voiceover.");
            } else { log("Voiceover skipped (not connected)."); }

            // 3. Trigger Music
            document.getElementById('musicPrompt').value = `Cinematic underscore matching: ${seed}, 100bpm`;
            generateMusic();
        }
    </script>
</body>
</html>
