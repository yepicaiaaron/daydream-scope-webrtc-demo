services:
  - type: web
    name: daydream-scope-proxy
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn proxy_app:app --worker-class gevent --bind 0.0.0.0:$PORT"
    envVars:
      - key: TARGET_SCOPE_URL
        value: "http://34.21.165.201:8000" # Your GCP Daydream Scope App IP and Port
