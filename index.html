<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daydream Scope Live Stream (Robust Connection)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h1 {
            color: #bb86fc;
            text-align: center;
            margin-bottom: 20px;
        }
        #video-display {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888;
            font-size: 1.2em;
            position: relative;
        }
        #fps-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #03dac6;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            display: none;
            z-index: 10;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #2a2a2a;
            color: #e0e0e0;
            font-size: 1em;
            min-width: 200px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            background-color: #03dac6;
            color: #121212;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover:not(:disabled) {
            background-color: #03a89e;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .strat-btn {
            background-color: #bb86fc;
            font-size: 0.8em;
            padding: 8px 12px;
        }
        .strat-btn:hover:not(:disabled) {
            background-color: #9965f4;
        }
        #status-log {
            background-color: #2a2a2a;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85em;
            color: #bbb;
        }
        .log-entry {
            margin-bottom: 8px;
            word-wrap: break-word;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
    
        .config-panel {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #444;
        }
        .config-row {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        select {
            padding: 8px;
            background-color: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
        }
        .nano-btn {
            background-color: #f6e05e;
            color: #121212;
        }
        .nano-btn:hover:not(:disabled) {
            background-color: #ecc94b;
        }
</style>
</head>
<body>
    <div class="container">
        <h1>Daydream Scope Live Feed</h1>
        <div class="config-panel">
            <h3>Pipeline Configuration</h3>
            <div class="config-row">
                <label>Model: <select id="pipelineSelect"><option value="memflow">MemFlow</option></select></label>
                <label>Upscaler: <select id="postprocessorSelect"><option value="rife">RIFE (Frame Interpolation)</option><option value="flashvsr">FlashVSR-Pro</option><option value="">None</option></select></label>
                <button id="loadPipelineBtn" style="padding: 8px 12px; font-size: 0.9em;">Load to VRAM</button>
            </div>
            
            <h3 style="margin-top: 15px;">VACE (Context Enforcement) & Nano Banana Pro</h3>
            <div class="config-row">
                <label><input type="checkbox" id="vaceToggle" checked> Enable VACE</label>
                <input type="file" id="vaceUpload" accept="image/*" style="max-width: 250px;">
                <button id="nanoBananaBtn" class="nano-btn" style="padding: 8px 12px; font-size: 0.9em;">🍌 Generate Perfect VACE Ref (Nano Banana)</button>
            </div>
            <div id="vacePreviewContainer" style="display: none; margin-top: 10px;">
                <img id="vacePreview" style="max-height: 100px; border-radius: 4px; border: 1px solid #555;">
                <span style="font-size: 0.8em; color: #888; margin-left: 10px;">VACE Reference Ready</span>
            </div>
        </div>

        <div id="video-display">
            <div id="fps-overlay"></div>
            <video id="remoteVideo" autoplay playsinline></video>
            <span id="video-placeholder">Ready to connect...</span>
        </div>

        <div class="controls">
            <input type="text" id="promptInput" placeholder="Enter prompt to influence video...">
            <button id="sendPromptBtn" disabled>Send Prompt</button>
            <button id="connectStreamBtn">Connect Stream</button>
            <button id="disconnectBtn" style="background-color: #ff5252; color: white;">Disconnect</button>
        </div>

        <div class="controls" style="margin-top: 10px; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px;">
            <label style="color: #e0e0e0; font-family: monospace; display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" id="useWebcamToggle" style="width: 18px; height: 18px;">
                Use Webcam (Video-to-Video)
            </label>
            <button id="clearCacheBtn" style="background-color: #ff9800; color: #121212; padding: 8px 12px; font-size: 0.85em; margin-left: auto;">🧹 Clear Backend Cache</button>
        </div>

        <div id="status-log"></div>
    </div>

    <script>
        const remoteVideo = document.getElementById('remoteVideo');
        const videoPlaceholder = document.getElementById('video-placeholder');
        const promptInput = document.getElementById('promptInput');
        const sendPromptBtn = document.getElementById('sendPromptBtn');
        const connectStreamBtn = document.getElementById('connectStreamBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const useWebcamToggle = document.getElementById('useWebcamToggle');
        const clearCacheBtn = document.getElementById('clearCacheBtn');
        const statusLog = document.getElementById('status-log');
        const fpsOverlay = document.getElementById('fps-overlay');

        const SCOPE_API_BASE = '';
        const SCOPE_WEBRTC_OFFER_ENDPOINT = `${SCOPE_API_BASE}/api/v1/webrtc/offer`;
        const pipelineSelect = document.getElementById('pipelineSelect');
        const postprocessorSelect = document.getElementById('postprocessorSelect');
        const loadPipelineBtn = document.getElementById('loadPipelineBtn');
        const vaceToggle = document.getElementById('vaceToggle');
        const vaceUpload = document.getElementById('vaceUpload');
        const nanoBananaBtn = document.getElementById('nanoBananaBtn');
        const vacePreview = document.getElementById('vacePreview');
        const vacePreviewContainer = document.getElementById('vacePreviewContainer');

        let vaceBase64Image = null;

        // Fetch schemas on load
        async function fetchSchemas() {
            try {
                const res = await fetch(`${SCOPE_API_BASE}/api/v1/pipelines/schemas`);
                const data = await res.json();
                pipelineSelect.innerHTML = '';
                postprocessorSelect.innerHTML = '<option value="">None</option>';
                
                Object.keys(data.pipelines).forEach(key => {
                    const pipe = data.pipelines[key];
                    const option = `<option value="${key}">${pipe.name || key}</option>`;
                    if (pipe.usage && pipe.usage.includes('postprocessor')) {
                        postprocessorSelect.innerHTML += option;
                    } else {
                        pipelineSelect.innerHTML += option;
                    }
                });
                pipelineSelect.value = 'reward-forcing';
                postprocessorSelect.value = 'rife';
            } catch (e) {
                console.error('Failed to load schemas', e);
            }
        }
        fetchSchemas();

        loadPipelineBtn.addEventListener('click', async () => {
            const pipeId = pipelineSelect.value;
            const postId = postprocessorSelect.value;
            const ids = postId ? [pipeId, postId] : [pipeId];
            
            logStatus(`Loading pipelines into VRAM: ${ids.join(', ')} (at 480p resolution)...`);
            loadPipelineBtn.disabled = true;
            try {
                await sendApiRequest(`${SCOPE_API_BASE}/api/v1/pipeline/load`, 
                    { 'Content-Type': 'application/json' }, 
                    JSON.stringify({ pipeline_ids: ids, load_params: { height: 480, width: 848 } })
                );
                logStatus(`✅ Sent load command successfully! Check /api/v1/pipeline/status for completion.`);
            } catch (e) {
                logStatus(`❌ Load command failed: ${e.message}`, true);
            }
            loadPipelineBtn.disabled = false;
        });

        vaceUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    vaceBase64Image = event.target.result;
                    vacePreview.src = vaceBase64Image;
                    vacePreviewContainer.style.display = 'flex';
                    logStatus('VACE Reference image loaded from file.');
                };
                reader.readAsDataURL(file);
            }
        });

        nanoBananaBtn.addEventListener('click', async () => {
            logStatus('🍌 Triggering Nano Banana Pro agent to generate the perfect VACE reference image...');
            const promptText = promptInput.value || "A cinematic scene";
            try {
                const res = await sendApiRequest(`${SCOPE_API_BASE}/api/generate-image`, 
                    { 'Content-Type': 'application/json' }, 
                    JSON.stringify({ prompt: promptText })
                );
                vaceBase64Image = res.image;
                vacePreview.src = vaceBase64Image;
                vacePreviewContainer.style.display = 'flex';
                logStatus('🍌 Nano Banana Pro finished! Image injected into VACE memory buffer.');
            } catch (e) {
                logStatus(`❌ Nano Banana Pro failed: ${e.message}`, true);
            }
        });

        function updateInitialParams() {
            INITIAL_PARAMS.pipeline_ids = postprocessorSelect.value ? [pipelineSelect.value, postprocessorSelect.value] : [pipelineSelect.value];
            INITIAL_PARAMS.vace_enabled = vaceToggle.checked;
            
            const currentPrompt = document.getElementById('promptInput').value.trim();
            if (currentPrompt) {
                INITIAL_PARAMS.prompts = [{ text: currentPrompt, weight: 100.0 }];
            } else {
                INITIAL_PARAMS.prompts = [{ text: "A breathtaking wide angle cinematic landscape, extremely detailed, 8k resolution, wide field of view", weight: 100.0 }];
            }

            if (vaceBase64Image && vaceToggle.checked) {
                INITIAL_PARAMS.ref_images = [vaceBase64Image];
            } else {
                delete INITIAL_PARAMS.ref_images;
            }
        }

        const SCOPE_PROMPT_ENDPOINT = `${SCOPE_API_BASE}/api/v1/prompt`;

        let peerConnection;
        let dataChannel;
        let isConnecting = false;
        let statsInterval = null;

        function logStatus(message, isError = false, rawData = null) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = isError ? '#ff5252' : (message.includes('Strategy') ? '#03dac6' : '#e0e0e0');
            
            let text = `[${new Date().toLocaleTimeString()}] ${message}`;
            if (rawData) {
                text += `\n<pre style="color:#888; background:#1a1a1a; padding:5px; margin-top:5px; overflow-x:auto;">${typeof rawData === 'object' ? JSON.stringify(rawData, null, 2) : rawData}</pre>`;
            }
            
            entry.innerHTML = text;
            statusLog.prepend(entry);
            
            if (statusLog.children.length > 200) {
                statusLog.removeChild(statusLog.lastChild);
            }
            console.log(message, rawData || '');
        }

        function stopStatsPolling() {
            if (statsInterval) {
                clearInterval(statsInterval);
                statsInterval = null;
            }
            fpsOverlay.style.display = 'none';
        }

        function startStatsPolling() {
            stopStatsPolling();
            fpsOverlay.style.display = 'block';
            let lastFrames = -1;
            let lastTime = performance.now();

            statsInterval = setInterval(async () => {
                if (!peerConnection) return;
                
                try {
                    const stats = await peerConnection.getStats();
                    let framesReceived = 0;
                    
                    stats.forEach(report => {
                        if (report.type === 'inbound-rtp' && report.kind === 'video') {
                            framesReceived = report.framesDecoded || report.framesReceived || 0;
                        }
                    });

                    if (framesReceived > 0) {
                        const now = performance.now();
                        
                        if (lastFrames === -1) {
                            lastFrames = framesReceived;
                            lastTime = now;
                            return;
                        }
                        
                        const timeDiff = (now - lastTime) / 1000;
                        const framesDiff = framesReceived - lastFrames;
                        const fps = Math.round(framesDiff / timeDiff);
                        
                        lastFrames = framesReceived;
                        lastTime = now;
                        
                        if (fps > 0 && fps < 200) {
                            const postProcessor = postprocessorSelect.value;
                            if (postProcessor === 'rife') {
                                // RIFE typically doubles or quadruples. Assuming 2x (Daydream Scope default)
                                const organicFps = Math.round(fps / 2);
                                fpsOverlay.innerText = `📊 Stream: ${fps} FPS | Organic: ${organicFps} FPS (RIFE 2x)`;
                            } else {
                                fpsOverlay.innerText = `📊 Stream: ${fps} FPS | Organic: ${fps} FPS`;
                            }
                        }
                    }
                } catch (e) {
                    console.error("Stats error", e);
                }
            }, 1000);
        }

        function createPeerConnectionBase() {
            if (peerConnection) {
                peerConnection.close();
            }
            
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            });

            pc.ontrack = (event) => {
                logStatus('✅ Received remote stream track! Playing video...');
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    videoPlaceholder.style.display = 'none';
                    remoteVideo.style.display = 'block';
                }
            };

            pc.oniceconnectionstatechange = () => {
                logStatus(`ICE connection state: ${pc.iceConnectionState}`);
            };

            pc.onconnectionstatechange = () => {
                logStatus(`WebRTC connection state: ${pc.connectionState}`);
                if (pc.connectionState === 'connected') {
                    logStatus('🎉 WebRTC Fully Connected! Video should be playing.');
                    connectStreamBtn.disabled = false;
                    sendPromptBtn.disabled = false;
                    isConnecting = false;
                    startStatsPolling();
                } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    if (!isConnecting) {
                        logStatus('WebRTC Disconnected.', true);
                        resetUI();
                        stopStatsPolling();
                    }
                }
            };


            
            // Setup parameters datachannel so Scope backend can receive prompts
            dataChannel = pc.createDataChannel("parameters", {ordered: true});
            dataChannel.onopen = () => { logStatus("Data channel 'parameters' opened!"); };

            return pc;
        }

        async function sendApiRequest(url, headers, body, expectJson = true) {
            const response = await fetch(url, { method: 'POST', headers, body });
            const text = await response.text();
            
            if (!response.ok) {
                throw new Error(`API Error ${response.status}: ${text}`);
            }
            
            return expectJson ? JSON.parse(text) : text;
        }

        // Allow overriding pipeline via URL parameter for testing
        const urlParams = new URLSearchParams(window.location.search);
        const pipelineOverride = urlParams.get('pipeline');
        const postprocessorOverride = urlParams.get('postprocessor');

        const pipelineIds = pipelineOverride ? [pipelineOverride] : ["memflow", "rife"];
        if (postprocessorOverride) {
            pipelineIds.push(postprocessorOverride);
        }

        const INITIAL_PARAMS = {
            pipeline_ids: pipelineIds,
            input_mode: "text",
            prompts: [{ text: "A photorealistic 8k macro portrait of a beautiful woman with freckles and green eyes, cinematic lighting, sharp focus, highly detailed texture, raw photo", weight: 100.0 }],
            prompt_interpolation_method: "linear",
            denoising_step_list: [1000, 750, 500, 250],
            manage_cache: true,
            vace_enabled: true,
            vace_context_scale: 1.0,
            recording: false
        };

        // Strategy 1: JSON format with full ICE gathering
        async function strategy1() {
            logStatus('--- Trying Strategy 1: JSON payload + Full ICE Gathering ---');
            peerConnection = createPeerConnectionBase();
            
            let localStream = null;
            if (useWebcamToggle.checked) {
                logStatus('📷 Requesting webcam access...');
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: { width: 576, height: 320, frameRate: 25 }, audio: false });
                    localStream.getTracks().forEach(track => {
                        peerConnection.addTrack(track, localStream);
                    });
                    INITIAL_PARAMS.input_mode = "video";
                    logStatus('📷 Webcam stream added to WebRTC connection');
                } catch(e) {
                    logStatus('❌ Webcam access denied or failed: ' + e.message, true);
                    INITIAL_PARAMS.input_mode = "text";
                    peerConnection.addTransceiver('video', { direction: 'sendrecv' });
                }
            } else {
                INITIAL_PARAMS.input_mode = "text";
                peerConnection.addTransceiver('video', { direction: 'sendrecv' });
            }
            peerConnection.addTransceiver('audio', { direction: 'recvonly' });
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            // Wait for ICE complete
            await new Promise((resolve) => {
                if (peerConnection.iceGatheringState === 'complete') return resolve();
                const check = () => {
                    if (peerConnection.iceGatheringState === 'complete') {
                        peerConnection.removeEventListener('icegatheringstatechange', check);
                        resolve();
                    }
                };
                peerConnection.addEventListener('icegatheringstatechange', check);
                setTimeout(() => { peerConnection.removeEventListener('icegatheringstatechange', check); resolve(); }, 3000);
            });

            const finalSdp = peerConnection.localDescription.sdp;
            
            const payload = { 
                sdp: finalSdp, 
                type: 'offer',
                initialParameters: INITIAL_PARAMS
            };

            const answer = await sendApiRequest(
                SCOPE_WEBRTC_OFFER_ENDPOINT, 
                { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                JSON.stringify(payload)
            );
            
            logStatus('Strategy 1 Server Answer received', false, answer);
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));

            setTimeout(() => {
                if (dataChannel && dataChannel.readyState === 'open') {
                    // Start generation explicitly unpaused, using the prompt from INITIAL_PARAMS
                    const startPrompt = INITIAL_PARAMS.prompts[0].text;
                    const startPayload = JSON.stringify({ 
                        prompt: startPrompt,
                        prompts: [{text: startPrompt, weight: 100.0}],
                        paused: false
                    });
                    dataChannel.send(startPayload);
                    logStatus(`Sent fallback prompts and unpause via Data Channel: ${startPayload}`);
                }
            }, 1000);
        }


        async function connectStream() {
            disconnect();
            isConnecting = true;
            statusLog.innerHTML = '';
            updateInitialParams();
            logStatus('🚀 Starting WebRTC connection...');
            connectStreamBtn.disabled = true;
            try {
                await strategy1();
                logStatus(`✅ Connection sequence completed! Waiting for stream...`);
            } catch (error) {
                logStatus(`❌ Connection Failed: ${error.message}`, true);
                disconnect();
            }
        }
        
        function disconnect() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            stopStatsPolling();
            resetUI();
        }

        function resetUI() {
            isConnecting = false;
            remoteVideo.srcObject = null;
            videoPlaceholder.style.display = 'block';
            remoteVideo.style.display = 'none';
            connectStreamBtn.disabled = false;
            sendPromptBtn.disabled = true;
        }

        async function sendPrompt() {
            const promptText = promptInput.value;
            if (!promptText) return;

            logStatus(`Sending prompt: "${promptText}"`);
            if (dataChannel && dataChannel.readyState === 'open') {
                try {
                    // Daydream Scope expects prompts array with weight 100.0
                    const payload = JSON.stringify({ 
                        prompt: promptText,
                        prompts: [{ text: promptText, weight: 100.0 }]
                    });
                    dataChannel.send(payload);
                    logStatus(`Prompt sent via Data Channel 'parameters'. Payload: ${payload}`);
                } catch (error) {
                    logStatus(`Error sending prompt via Data Channel: ${error.message}`, true);
                }
            } else {
                logStatus('Data channel not open. Ensure stream is connected.', true);
            }
            promptInput.value = '';
        }

        connectStreamBtn.addEventListener('click', connectStream);
        disconnectBtn.addEventListener('click', disconnect);
        sendPromptBtn.addEventListener('click', sendPrompt);
        
        clearCacheBtn.addEventListener('click', () => {
            logStatus('🧹 Sending Clear Cache command...');
            if (dataChannel && dataChannel.readyState === 'open') {
                try {
                    const payload = JSON.stringify({ reset_cache: true });
                    dataChannel.send(payload);
                    logStatus(`Sent via Data Channel: ${payload}`);
                } catch (error) {
                    logStatus(`Error sending clear cache: ${error.message}`, true);
                }
            } else {
                logStatus('Data channel not open. Ensure stream is connected.', true);
            }
        });
        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendPrompt();
        });

    </script>
</body>
</html>
