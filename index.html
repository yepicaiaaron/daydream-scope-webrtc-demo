<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daydream Scope Live Stream</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h1 {
            color: #bb86fc;
            text-align: center;
            margin-bottom: 20px;
        }
        #video-display {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888;
            font-size: 1.2em;
        }\n        video {\n            width: 100%;\n            height: 100%;\n            object-fit: contain; /* Use 'contain' to ensure the whole video is visible */\n        }\n        .controls {\n            display: flex;\n            gap: 10px;\n            flex-wrap: wrap;\n        }\n        input[type=\"text\"] {\n            flex-grow: 1;\n            padding: 12px;\n            border: 1px solid #333;\n            border-radius: 5px;\n            background-color: #2a2a2a;\n            color: #e0e0e0;\n            font-size: 1em;\n            min-width: 200px;\n        }\n        button {\n            padding: 12px 20px;\n            border: none;\n            border-radius: 5px;\n            background-color: #03dac6;\n            color: #121212;\n            font-size: 1em;\n            font-weight: bold;\n            cursor: pointer;\n            transition: background-color 0.2s;\n        }\n        button:hover:not(:disabled) {\n            background-color: #03a89e;\n        }\n        button:disabled {\n            background-color: #555;\n            cursor: not-allowed;\n        }\n        #status-log {\n            background-color: #2a2a2a;\n            border: 1px solid #333;\n            border-radius: 5px;\n            padding: 10px;\n            max-height: 150px;\n            overflow-y: auto;\n            font-family: 'Courier New', Courier, monospace;\n            font-size: 0.9em;\n            color: #bbb;\n        }\n        .log-entry {\n            margin-bottom: 5px;\n            word-wrap: break-word;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <h1>Daydream Scope Live Feed</h1>\n        <div id=\"video-display\">\n            <video id=\"remoteVideo\" autoplay playsinline></video>\n            <span id=\"video-placeholder\">Connecting to Scope...</span>\n        </div>\n\n        <div class=\"controls\">\n            <input type=\"text\" id=\"promptInput\" placeholder=\"Enter prompt to influence video...\">\n            <button id=\"sendPromptBtn\">Send Prompt</button>\n            <button id=\"connectStreamBtn\">Connect Stream</button>\n        </div>\n\n        <div id=\"status-log\"></div>\n    </div>\n\n    <script>\n        const remoteVideo = document.getElementById('remoteVideo');\n        const videoPlaceholder = document.getElementById('video-placeholder');\n        const promptInput = document.getElementById('promptInput');\n        const sendPromptBtn = document.getElementById('sendPromptBtn');\n        const connectStreamBtn = document.getElementById('connectStreamBtn');\n        const statusLog = document.getElementById('status-log');\n\n        const SCOPE_API_BASE = 'http://localhost:8000';\n        const SCOPE_WEBRTC_OFFER_ENDPOINT = `${SCOPE_API_BASE}/api/v1/webrtc/offer`;\n        const SCOPE_PROMPT_ENDPOINT = `${SCOPE_API_BASE}/api/v1/prompt`; // Placeholder or actual prompt API\n\n        let peerConnection;\n        let dataChannel;\n\n        function logStatus(message, isError = false) {\n            const entry = document.createElement('div');\n            entry.className = 'log-entry';\n            entry.style.color = isError ? '#cf6679' : '#e0e0e0';\n            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;\n            statusLog.prepend(entry);\n            // Keep log clean, max 100 entries\n            if (statusLog.children.length > 100) {\n                statusLog.removeChild(statusLog.lastChild);\n            }\n            console.log(message);\n        }\n\n        async function createPeerConnection() {\n            peerConnection = new RTCPeerConnection({\n                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]\n            });\n\n            peerConnection.ontrack = (event) => {\n                logStatus('Received remote stream track.');\n                if (remoteVideo.srcObject !== event.streams[0]) {\n                    remoteVideo.srcObject = event.streams[0];\n                    videoPlaceholder.style.display = 'none';\n                    remoteVideo.style.display = 'block';\n                }\n            };\n\n            peerConnection.onicecandidate = (event) => {\n                if (event.candidate) {\n                    // ICE candidates are usually exchanged via the signaling server\n                    // In a WHIP/WHEP context, ICE candidates are part of SDP, not separate messages\n                    logStatus('ICE candidate gathered (not sent separately in WHIP/WHEP model).');\n                }\n            };\n\n            peerConnection.oniceconnectionstatechange = () => {\n                logStatus(`ICE connection state: ${peerConnection.iceConnectionState}`);\n                if (peerConnection.iceConnectionState === 'failed' || peerConnection.iceConnectionState === 'disconnected') {\n                    logStatus('ICE connection failed or disconnected. Attempting to reconnect or restart.', true);\n                    // Implement re-connection logic if necessary\n                }\n            };\n\n            peerConnection.onconnectionstatechange = () => {\n                logStatus(`WebRTC connection state: ${peerConnection.connectionState}`);\n                if (peerConnection.connectionState === 'connected') {\n                    logStatus('WebRTC PeerConnection established!');\n                    connectStreamBtn.textContent = 'Disconnect Stream';\n                    connectStreamBtn.disabled = false;\n                    sendPromptBtn.disabled = false;\n                } else if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {\n                    logStatus('WebRTC PeerConnection disconnected or failed.', true);\n                    connectStreamBtn.textContent = 'Connect Stream';\n                    connectStreamBtn.disabled = false;\n                    sendPromptBtn.disabled = true;\n                }\n            };\n\n            // Create a data channel for sending prompts\n            dataChannel = peerConnection.createDataChannel(\"prompts\");\n            dataChannel.onopen = (event) => {\n                logStatus(\"Data channel opened for prompts!\");\n                sendPromptBtn.disabled = false;\n            };\n            dataChannel.onmessage = (event) => {\n                logStatus(`Data channel message received: ${event.data}`);\n            };\n            dataChannel.onclose = () => {\n                logStatus(\"Data channel closed.\");\n                sendPromptBtn.disabled = true;\n            };\n            dataChannel.onerror = (error) => {\n                logStatus(`Data channel error: ${error}`, true);\n            };\n\n            // Request to receive video and audio\n            peerConnection.addTransceiver('video', { direction: 'recvonly' });\n            peerConnection.addTransceiver('audio', { direction: 'recvonly' });\n\n            const offer = await peerConnection.createOffer();\n            await peerConnection.setLocalDescription(offer);

            logStatus('Created SDP offer. Sending to Scope API...');\n            return offer;\n        }\n\n        async function sendOfferAndHandleAnswer(offer) {\n            try {\n                const response = await fetch(SCOPE_WEBRTC_OFFER_ENDPOINT, {\n                    method: 'POST',\n                    headers: {\n                        'Content-Type': 'application/sdp', // WHIP/WHEP expects application/sdp\n                        'Accept': 'application/sdp'\n                    },\n                    body: offer.sdp\n                });\n\n                if (!response.ok) {\n                    const errorText = await response.text();\n                    throw new Error(`Failed to get SDP answer: ${response.status} ${response.statusText} - ${errorText}`);\n                }\n\n                const sdpAnswer = await response.text();\n                await peerConnection.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: sdpAnswer }));\n                logStatus('Received and set SDP answer. Stream should be connecting.');\n\n            } catch (error) {\n                logStatus(`Error during offer/answer exchange: ${error.message}`, true);\n                resetConnection();\n            }\n        }\n\n        async function connectStream() {\n            if (peerConnection && peerConnection.connectionState !== 'closed') {\n                logStatus('Disconnecting existing stream.');\n                peerConnection.close();\n                resetConnection();\n                return;\n            }\n\n            logStatus('Attempting to connect to Daydream Scope Stream...');\n            connectStreamBtn.disabled = true;\n            sendPromptBtn.disabled = true;\n            videoPlaceholder.style.display = 'block';\n            remoteVideo.style.display = 'none';\n            remoteVideo.srcObject = null;\n\n            try {\n                const offer = await createPeerConnection();\n                await sendOfferAndHandleAnswer(offer);\n            } catch (error) {\n                logStatus(`Failed to initiate stream: ${error.message}`, true);\n                resetConnection();\n            }\n        }\n\n        function resetConnection() {\n            if (peerConnection) {\n                peerConnection.close();\n                peerConnection = null;\n            }\n            if (dataChannel) {\n                dataChannel = null;\n            }\n            remoteVideo.srcObject = null;\n            videoPlaceholder.style.display = 'block';\n            remoteVideo.style.display = 'none';\n            connectStreamBtn.textContent = 'Connect Stream';\n            connectStreamBtn.disabled = false;\n            sendPromptBtn.disabled = true;\n            logStatus('Connection reset.');\n        }\n\n        async function sendPrompt() {\n            const promptText = promptInput.value;\n            if (!promptText) {\n                logStatus('Prompt input is empty.', true);\n                return;\n            }\n\n            logStatus(`Attempting to send prompt: \"${promptText}\"`);\n            if (dataChannel && dataChannel.readyState === 'open') {\n                try {\n                    dataChannel.send(JSON.stringify({ type: 'prompt', text: promptText, timestamp: Date.now() }));\n                    logStatus(`Prompt sent via Data Channel.`);\n                } catch (error) {\n                    logStatus(`Error sending prompt via Data Channel: ${error.message}`, true);\n                }\n            } else {\n                logStatus('Data channel not open or not available. Attempting via HTTP API (fallback)...');\n                try {\n                    const response = await fetch(SCOPE_PROMPT_ENDPOINT, {\n                        method: 'POST',\n                        headers: {\n                            'Content-Type': 'application/json',\n                        },\n                        body: JSON.stringify({ prompt: promptText })\n                    });\n                    if (!response.ok) {\n                        const errorText = await response.text();\n                        throw new Error(`API failed: ${response.status} ${response.statusText} - ${errorText}`);\n                    }\n                    logStatus(`Prompt sent via HTTP API. Server response: ${await response.json().then(data => JSON.stringify(data))}`);\n                } catch (error) {\n                    logStatus(`Failed to send prompt via HTTP API: ${error.message}`, true);\n                }\n            }\n            promptInput.value = '';\n        }\n\n        connectStreamBtn.addEventListener('click', connectStream);\n        sendPromptBtn.addEventListener('click', sendPrompt);\n        promptInput.addEventListener('keypress', (e) => {\n            if (e.key === 'Enter') {\n                sendPrompt();\n            }\n        });\n\n        // Initial setup\n        sendPromptBtn.disabled = true;\n        remoteVideo.style.display = 'none';\n    </script>\n</body>\n</html>
