<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daydream Scope Live Stream (Robust Connection)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h1 {
            color: #bb86fc;
            text-align: center;
            margin-bottom: 20px;
        }
        #video-display {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888;
            font-size: 1.2em;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #2a2a2a;
            color: #e0e0e0;
            font-size: 1em;
            min-width: 200px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            background-color: #03dac6;
            color: #121212;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover:not(:disabled) {
            background-color: #03a89e;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #status-log {
            background-color: #2a2a2a;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85em;
            color: #bbb;
        }
        .log-entry {
            margin-bottom: 8px;
            word-wrap: break-word;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daydream Scope Live Feed</h1>
        <div id="video-display">
            <video id="remoteVideo" autoplay playsinline></video>
            <span id="video-placeholder">Ready to connect...</span>
        </div>

        <div class="controls">
            <input type="text" id="promptInput" placeholder="Enter prompt to influence video...">
            <button id="sendPromptBtn" disabled>Send Prompt</button>
            <button id="connectStreamBtn">Connect Stream (Auto-Retry)</button>
        </div>

        <div id="status-log"></div>
    </div>

    <script>
        const remoteVideo = document.getElementById('remoteVideo');
        const videoPlaceholder = document.getElementById('video-placeholder');
        const promptInput = document.getElementById('promptInput');
        const sendPromptBtn = document.getElementById('sendPromptBtn');
        const connectStreamBtn = document.getElementById('connectStreamBtn');
        const statusLog = document.getElementById('status-log');

        const SCOPE_API_BASE = 'https://daydream-scope-proxy.onrender.com';
        const SCOPE_WEBRTC_OFFER_ENDPOINT = `${SCOPE_API_BASE}/api/v1/webrtc/offer`;
        const SCOPE_PROMPT_ENDPOINT = `${SCOPE_API_BASE}/api/v1/prompt`;

        let peerConnection;
        let dataChannel;
        let isConnecting = false;

        function logStatus(message, isError = false, rawData = null) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = isError ? '#ff5252' : (message.includes('Strategy') ? '#03dac6' : '#e0e0e0');
            
            let text = `[${new Date().toLocaleTimeString()}] ${message}`;
            if (rawData) {
                text += `\n<pre style="color:#888; background:#1a1a1a; padding:5px; margin-top:5px; overflow-x:auto;">${typeof rawData === 'object' ? JSON.stringify(rawData, null, 2) : rawData}</pre>`;
            }
            
            entry.innerHTML = text;
            statusLog.prepend(entry);
            
            if (statusLog.children.length > 200) {
                statusLog.removeChild(statusLog.lastChild);
            }
            console.log(message, rawData || '');
        }

        function createPeerConnectionBase() {
            if (peerConnection) {
                peerConnection.close();
            }
            
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            });

            pc.ontrack = (event) => {
                logStatus('✅ Received remote stream track! Playing video...');
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    videoPlaceholder.style.display = 'none';
                    remoteVideo.style.display = 'block';
                }
            };

            pc.oniceconnectionstatechange = () => {
                logStatus(`ICE connection state: ${pc.iceConnectionState}`);
            };

            pc.onconnectionstatechange = () => {
                logStatus(`WebRTC connection state: ${pc.connectionState}`);
                if (pc.connectionState === 'connected') {
                    logStatus('🎉 WebRTC Fully Connected!');
                    connectStreamBtn.textContent = 'Disconnect Stream';
                    connectStreamBtn.disabled = false;
                    sendPromptBtn.disabled = false;
                    isConnecting = false;
                } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    if (!isConnecting) {
                        logStatus('WebRTC Disconnected.', true);
                        resetUI();
                    }
                }
            };

            // Request to receive video and audio
            pc.addTransceiver('video', { direction: 'recvonly' });
            pc.addTransceiver('audio', { direction: 'recvonly' });

            return pc;
        }

        async function sendApiRequest(url, headers, body, expectJson = true) {
            const response = await fetch(url, { method: 'POST', headers, body });
            const text = await response.text();
            
            if (!response.ok) {
                throw new Error(`API Error ${response.status}: ${text}`);
            }
            
            return expectJson ? JSON.parse(text) : text;
        }

        // Strategy 1: JSON format with full ICE gathering
        async function strategy1() {
            logStatus('--- Trying Strategy 1: JSON payload + Full ICE Gathering ---');
            peerConnection = createPeerConnectionBase();
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            // Wait for ICE complete
            await new Promise((resolve) => {
                if (peerConnection.iceGatheringState === 'complete') return resolve();
                const check = () => {
                    if (peerConnection.iceGatheringState === 'complete') {
                        peerConnection.removeEventListener('icegatheringstatechange', check);
                        resolve();
                    }
                };
                peerConnection.addEventListener('icegatheringstatechange', check);
                setTimeout(() => { peerConnection.removeEventListener('icegatheringstatechange', check); resolve(); }, 3000);
            });

            const finalSdp = peerConnection.localDescription.sdp;
            logStatus('Strategy 1 SDP generated', false, finalSdp);

            const answer = await sendApiRequest(
                SCOPE_WEBRTC_OFFER_ENDPOINT, 
                { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                JSON.stringify({ sdp: finalSdp, type: 'offer' })
            );
            
            logStatus('Strategy 1 Server Answer received', false, answer);
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        }

        // Strategy 2: Plain Text SDP (application/sdp) + Full ICE
        async function strategy2() {
            logStatus('--- Trying Strategy 2: Raw application/sdp text + Full ICE ---');
            peerConnection = createPeerConnectionBase();
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await new Promise((resolve) => {
                if (peerConnection.iceGatheringState === 'complete') return resolve();
                const check = () => {
                    if (peerConnection.iceGatheringState === 'complete') {
                        peerConnection.removeEventListener('icegatheringstatechange', check);
                        resolve();
                    }
                };
                peerConnection.addEventListener('icegatheringstatechange', check);
                setTimeout(() => { peerConnection.removeEventListener('icegatheringstatechange', check); resolve(); }, 3000);
            });

            const finalSdp = peerConnection.localDescription.sdp;
            const answerText = await sendApiRequest(
                SCOPE_WEBRTC_OFFER_ENDPOINT, 
                { 'Content-Type': 'application/sdp', 'Accept': 'application/sdp' },
                finalSdp,
                false
            );
            
            logStatus('Strategy 2 Server Answer received', false, answerText);
            // Some servers return raw text for application/sdp
            let answerDesc = { type: 'answer', sdp: answerText };
            try { answerDesc = JSON.parse(answerText); } catch(e) {} // Fallback if server sent JSON anyway
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answerDesc));
        }

        // Strategy 3: JSON payload + Trickle ICE (Immediate offer, no waiting)
        async function strategy3() {
            logStatus('--- Trying Strategy 3: JSON payload + Trickle ICE (No waiting) ---');
            peerConnection = createPeerConnectionBase();
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            logStatus('Strategy 3 SDP generated (Trickle)', false, offer.sdp);

            const answer = await sendApiRequest(
                SCOPE_WEBRTC_OFFER_ENDPOINT, 
                { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                JSON.stringify({ sdp: offer.sdp, type: 'offer' })
            );
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        }

        // Strategy 4: Raw SDP Text + Trickle ICE
        async function strategy4() {
            logStatus('--- Trying Strategy 4: Raw application/sdp + Trickle ICE ---');
            peerConnection = createPeerConnectionBase();
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            const answerText = await sendApiRequest(
                SCOPE_WEBRTC_OFFER_ENDPOINT, 
                { 'Content-Type': 'application/sdp', 'Accept': 'application/sdp' },
                offer.sdp,
                false
            );
            
            let answerDesc = { type: 'answer', sdp: answerText };
            try { answerDesc = JSON.parse(answerText); } catch(e) {}
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answerDesc));
        }

        // Strategy 5: Add a DataChannel before creating the offer
        // Sometimes backend requires a data channel to generate ice-ufrag properly for Aiortc
        async function strategy5() {
            logStatus('--- Trying Strategy 5: DataChannel forced + JSON + Full ICE ---');
            peerConnection = createPeerConnectionBase();
            
            // Force Data Channel creation BEFORE offer
            dataChannel = peerConnection.createDataChannel("prompts");
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await new Promise((resolve) => {
                if (peerConnection.iceGatheringState === 'complete') return resolve();
                const check = () => {
                    if (peerConnection.iceGatheringState === 'complete') {
                        peerConnection.removeEventListener('icegatheringstatechange', check);
                        resolve();
                    }
                };
                peerConnection.addEventListener('icegatheringstatechange', check);
                setTimeout(() => { peerConnection.removeEventListener('icegatheringstatechange', check); resolve(); }, 3000);
            });

            const finalSdp = peerConnection.localDescription.sdp;
            logStatus('Strategy 5 SDP generated', false, finalSdp);

            const answer = await sendApiRequest(
                SCOPE_WEBRTC_OFFER_ENDPOINT, 
                { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                JSON.stringify({ sdp: finalSdp, type: 'offer' })
            );
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        }

        async function executeConnectionLoop() {
            const strategies = [strategy1, strategy2, strategy3, strategy4, strategy5];
            
            for (let i = 0; i < strategies.length; i++) {
                try {
                    await strategies[i]();
                    logStatus(`✅ Strategy ${i+1} completed SDP exchange without errors! Waiting for stream...`);
                    return; // If it succeeds, exit loop
                } catch (error) {
                    logStatus(`❌ Strategy ${i+1} Failed: ${error.message}`, true);
                    if (peerConnection) peerConnection.close();
                }
            }
            
            logStatus('🚨 All 5 connection strategies failed. Please send a screenshot of this log block to the agent.', true);
            resetUI();
        }

        async function connectStream() {
            if (peerConnection && peerConnection.connectionState !== 'closed') {
                logStatus('Disconnecting existing stream.');
                peerConnection.close();
                resetUI();
                return;
            }

            isConnecting = true;
            statusLog.innerHTML = ''; // Clear previous logs
            logStatus('🚀 Starting automated WebRTC connection sequence...');
            connectStreamBtn.disabled = true;
            sendPromptBtn.disabled = true;
            videoPlaceholder.style.display = 'block';
            remoteVideo.style.display = 'none';
            remoteVideo.srcObject = null;

            await executeConnectionLoop();
        }

        function resetUI() {
            isConnecting = false;
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            remoteVideo.srcObject = null;
            videoPlaceholder.style.display = 'block';
            remoteVideo.style.display = 'none';
            connectStreamBtn.textContent = 'Connect Stream (Auto-Retry)';
            connectStreamBtn.disabled = false;
            sendPromptBtn.disabled = true;
        }

        async function sendPrompt() {
            const promptText = promptInput.value;
            if (!promptText) return;

            logStatus(`Sending prompt via HTTP: "${promptText}"`);
            try {
                const response = await fetch(SCOPE_PROMPT_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptText })
                });
                if (!response.ok) throw new Error(await response.text());
                logStatus('Prompt successfully received by server.');
            } catch (error) {
                logStatus(`Prompt failed: ${error.message}`, true);
            }
            promptInput.value = '';
        }

        connectStreamBtn.addEventListener('click', connectStream);
        sendPromptBtn.addEventListener('click', sendPrompt);
        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendPrompt();
        });

    </script>
</body>
</html>
