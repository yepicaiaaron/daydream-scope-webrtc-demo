<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Independent Helios Stream Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            background-color: #161b22;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 800px;
            border: 1px solid #30363d;
        }
        h1 {
            color: #58a6ff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        #video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #30363d;
            margin-bottom: 20px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        .placeholder-text {
            color: #8b949e;
            font-size: 1.1rem;
        }
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }
        button {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            background-color: #238636;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2ea043;
        }
        button:disabled {
            background-color: #213547;
            color: #8b949e;
            cursor: not-allowed;
        }
        #log-container {
            background-color: #010409;
            border-radius: 6px;
            padding: 12px;
            height: 200px;
            overflow-y: auto;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.85rem;
            border: 1px solid #30363d;
        }
        .log-entry {
            margin-bottom: 4px;
            line-height: 1.4;
            border-bottom: 1px solid #161b22;
            padding-bottom: 2px;
        }
        .log-time {
            color: #8b949e;
            margin-right: 8px;
        }
        .log-info { color: #c9d1d9; }
        .log-success { color: #3fb950; }
        .log-error { color: #f85149; }
        .log-warn { color: #d29922; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Helios Independent Endpoint Test</h1>
        
        <div id="video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            <div id="placeholder" class="placeholder-text">Ready to test connection...</div>
        </div>

        <div class="controls">
            <button id="connectBtn">Connect to Helios</button>
            <button id="disconnectBtn" disabled>Disconnect</button>
        </div>

        <div id="log-container"></div>
    </div>

    <script>
        const remoteVideo = document.getElementById('remoteVideo');
        const placeholder = document.getElementById('placeholder');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const logContainer = document.getElementById('log-container');

        const SIGNALING_SERVER = 'https://77.231.202.135:11794';
        const TURN_SERVER = 'turn:77.231.202.135:3478';

        let pc = null;

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="message">${message}</span>`;
            logContainer.prepend(entry);
            console.log(`[${time}] ${message}`);
        }

        async function connect() {
            log('Starting connection process...', 'info');
            connectBtn.disabled = true;
            placeholder.textContent = 'Connecting...';

            try {
                const iceConfig = {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { 
                            urls: TURN_SERVER,
                            username: 'user1',
                            credential: 'user1' // Standard default for testing if not specified
                        }
                    ]
                };

                log('Initializing RTCPeerConnection...', 'info');
                pc = new RTCPeerConnection(iceConfig);

                pc.oniceconnectionstatechange = () => {
                    log(`ICE State changed: ${pc.iceConnectionState}`, pc.iceConnectionState === 'failed' ? 'error' : 'info');
                };

                pc.onconnectionstatechange = () => {
                    log(`Connection State: ${pc.connectionState}`, pc.connectionState === 'connected' ? 'success' : (pc.connectionState === 'failed' ? 'error' : 'info'));
                    if (pc.connectionState === 'connected') {
                        placeholder.style.display = 'none';
                        remoteVideo.style.display = 'block';
                        disconnectBtn.disabled = false;
                    }
                };

                pc.ontrack = (event) => {
                    log('Received remote stream track.', 'success');
                    if (remoteVideo.srcObject !== event.streams[0]) {
                        remoteVideo.srcObject = event.streams[0];
                    }
                };

                // Add transceiver for receiving video
                pc.addTransceiver('video', { direction: 'recvonly' });
                log('Added video transceiver (recvonly).', 'info');

                log('Creating offer...', 'info');
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                log('Sending offer to signaling server...', 'info');
                const response = await fetch(`${SIGNALING_SERVER}/api/v1/webrtc/offer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sdp: offer.sdp,
                        type: offer.type,
                        room: 'test_room'
                    })
                });

                if (!response.ok) {
                    throw new Error(`Signaling failed: ${response.status} ${response.statusText}`);
                }

                const answer = await response.json();
                log('Received answer from signaling server.', 'success');
                
                await pc.setRemoteDescription(new RTCSessionDescription({
                    type: 'answer',
                    sdp: answer.sdp
                }));
                log('Set remote description successfully.', 'success');

            } catch (err) {
                log(`Error: ${err.message}`, 'error');
                placeholder.textContent = 'Connection failed.';
                connectBtn.disabled = false;
            }
        }

        function disconnect() {
            log('Disconnecting...', 'info');
            if (pc) {
                pc.close();
                pc = null;
            }
            remoteVideo.srcObject = null;
            remoteVideo.style.display = 'none';
            placeholder.style.display = 'block';
            placeholder.textContent = 'Disconnected.';
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
        }

        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);

        log('Page initialized. Ready to test Helios endpoint.', 'info');
    </script>
</body>
</html>
