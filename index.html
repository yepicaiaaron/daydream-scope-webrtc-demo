<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daydream Scope Live Stream (Robust Connection)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h1 {
            color: #bb86fc;
            text-align: center;
            margin-bottom: 20px;
        }
        #video-display {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888;
            font-size: 1.2em;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #2a2a2a;
            color: #e0e0e0;
            font-size: 1em;
            min-width: 200px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            background-color: #03dac6;
            color: #121212;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover:not(:disabled) {
            background-color: #03a89e;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .strat-btn {
            background-color: #bb86fc;
            font-size: 0.8em;
            padding: 8px 12px;
        }
        .strat-btn:hover:not(:disabled) {
            background-color: #9965f4;
        }
        #status-log {
            background-color: #2a2a2a;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85em;
            color: #bbb;
        }
        .log-entry {
            margin-bottom: 8px;
            word-wrap: break-word;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daydream Scope Live Feed</h1>
        <div id="video-display">
            <video id="remoteVideo" autoplay playsinline></video>
            <span id="video-placeholder">Ready to connect...</span>
        </div>

        <div class="controls">
            <select id="pipelineSelect" style="padding: 12px; border: 1px solid #333; border-radius: 5px; background-color: #2a2a2a; color: #e0e0e0; font-size: 1em;">
                <option value="memflow">MemFlow (Default)</option>
                <option value="shotstream">ShotStream (Causal Multi-Shot)</option>
            </select>
            <input type="text" id="promptInput" placeholder="Enter prompt to influence video...">
            <button id="sendPromptBtn" disabled>Send Prompt</button>
            <button id="connectStreamBtn">Connect Stream</button>
            <button id="disconnectBtn" style="background-color: #ff5252; color: white;">Disconnect</button>
        </div>

        <div id="status-log"></div>
    </div>

    <script>
        const remoteVideo = document.getElementById('remoteVideo');
        const videoPlaceholder = document.getElementById('video-placeholder');
        const promptInput = document.getElementById('promptInput');
        const sendPromptBtn = document.getElementById('sendPromptBtn');
        const connectStreamBtn = document.getElementById('connectStreamBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const statusLog = document.getElementById('status-log');

        const SCOPE_API_BASE = 'https://daydream-scope-proxy.onrender.com';
        const SCOPE_WEBRTC_OFFER_ENDPOINT = `${SCOPE_API_BASE}/api/v1/webrtc/offer`;
        const SCOPE_PROMPT_ENDPOINT = `${SCOPE_API_BASE}/api/v1/prompt`;

        let peerConnection;
        let dataChannel;
        let isConnecting = false;

        function logStatus(message, isError = false, rawData = null) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = isError ? '#ff5252' : (message.includes('Strategy') ? '#03dac6' : '#e0e0e0');
            
            let text = `[${new Date().toLocaleTimeString()}] ${message}`;
            if (rawData) {
                text += `\n<pre style="color:#888; background:#1a1a1a; padding:5px; margin-top:5px; overflow-x:auto;">${typeof rawData === 'object' ? JSON.stringify(rawData, null, 2) : rawData}</pre>`;
            }
            
            entry.innerHTML = text;
            statusLog.prepend(entry);
            
            if (statusLog.children.length > 200) {
                statusLog.removeChild(statusLog.lastChild);
            }
            console.log(message, rawData || '');
        }

        function createPeerConnectionBase() {
            if (peerConnection) {
                peerConnection.close();
            }
            
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            });

            pc.ontrack = (event) => {
                logStatus('✅ Received remote stream track! Playing video...');
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    videoPlaceholder.style.display = 'none';
                    remoteVideo.style.display = 'block';
                }
            };

            pc.oniceconnectionstatechange = () => {
                logStatus(`ICE connection state: ${pc.iceConnectionState}`);
            };

            pc.onconnectionstatechange = () => {
                logStatus(`WebRTC connection state: ${pc.connectionState}`);
                if (pc.connectionState === 'connected') {
                    logStatus('🎉 WebRTC Fully Connected! Video should be playing.');
                    connectStreamBtn.disabled = false;
                    sendPromptBtn.disabled = false;
                    isConnecting = false;
                } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    if (!isConnecting) {
                        logStatus('WebRTC Disconnected.', true);
                        resetUI();
                    }
                }
            };

            // Request to receive video and audio (using sendrecv to match native UI behavior)
            pc.addTransceiver('video', { direction: 'sendrecv' });
            pc.addTransceiver('audio', { direction: 'recvonly' });
            
            // Setup parameters datachannel so Scope backend can receive prompts
            dataChannel = pc.createDataChannel("parameters", {ordered: true});
            dataChannel.onopen = () => { logStatus("Data channel 'parameters' opened!"); };

            return pc;
        }

        async function sendApiRequest(url, headers, body, expectJson = true) {
            const response = await fetch(url, { method: 'POST', headers, body });
            const text = await response.text();
            
            if (!response.ok) {
                throw new Error(`API Error ${response.status}: ${text}`);
            }
            
            return expectJson ? JSON.parse(text) : text;
        }

        function getInitialParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const pipelineOverride = urlParams.get('pipeline');
            const postprocessorOverride = urlParams.get('postprocessor');
            const selectEl = document.getElementById('pipelineSelect');
            
            let pipelineIds = [];
            
            if (pipelineOverride) {
                pipelineIds.push(pipelineOverride);
            } else if (selectEl) {
                pipelineIds.push(selectEl.value);
            } else {
                pipelineIds.push("memflow");
            }
            
            if (postprocessorOverride) {
                pipelineIds.push(postprocessorOverride);
            } else if (pipelineIds[0] === "memflow") {
                pipelineIds.push("flashvsr");
            }

            return {
                pipeline_ids: pipelineIds,
                input_mode: "text",
                prompts: [{ text: "A 3D animated scene. A **panda** walks along a path towards the camera in a park on a spring day.", weight: 100.0 }],
                prompt_interpolation_method: "linear",
                denoising_step_list: [1000, 750, 500, 250],
                manage_cache: true,
                vace_enabled: true,
                vace_context_scale: 1.0,
                recording: false
            };
        }

        // Strategy 1: JSON format with full ICE gathering
        async function strategy1() {
            logStatus('--- Trying Strategy 1: JSON payload + Full ICE Gathering ---');
            peerConnection = createPeerConnectionBase();
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            // Wait for ICE complete
            await new Promise((resolve) => {
                if (peerConnection.iceGatheringState === 'complete') return resolve();
                const check = () => {
                    if (peerConnection.iceGatheringState === 'complete') {
                        peerConnection.removeEventListener('icegatheringstatechange', check);
                        resolve();
                    }
                };
                peerConnection.addEventListener('icegatheringstatechange', check);
                setTimeout(() => { peerConnection.removeEventListener('icegatheringstatechange', check); resolve(); }, 3000);
            });

            const finalSdp = peerConnection.localDescription.sdp;
            
            const payload = { 
                sdp: finalSdp, 
                type: 'offer',
                initialParameters: getInitialParams()
            };

            const answer = await sendApiRequest(
                SCOPE_WEBRTC_OFFER_ENDPOINT, 
                { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                JSON.stringify(payload)
            );
            
            logStatus('Strategy 1 Server Answer received', false, answer);
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));

            setTimeout(() => {
                if (dataChannel && dataChannel.readyState === 'open') {
                    // Try both `prompts` and `prompt` formats just in case, and explicitly set paused to false
                    const startPayload = JSON.stringify({ 
                        prompt: "A cinematic landscape",
                        prompts: [{text: "A cinematic landscape", weight: 1.0}],
                        paused: false
                    });
                    dataChannel.send(startPayload);
                    logStatus(`Sent fallback prompts and unpause via Data Channel: ${startPayload}`);
                }
            }, 1000);
        }


        async function connectStream() {
            disconnect();
            isConnecting = true;
            statusLog.innerHTML = '';
            logStatus('🚀 Starting WebRTC connection...');
            connectStreamBtn.disabled = true;
            try {
                await strategy1();
                logStatus(`✅ Connection sequence completed! Waiting for stream...`);
            } catch (error) {
                logStatus(`❌ Connection Failed: ${error.message}`, true);
                disconnect();
            }
        }
        
        function disconnect() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            resetUI();
        }

        function resetUI() {
            isConnecting = false;
            remoteVideo.srcObject = null;
            videoPlaceholder.style.display = 'block';
            remoteVideo.style.display = 'none';
            connectStreamBtn.disabled = false;
            sendPromptBtn.disabled = true;
        }

        async function sendPrompt() {
            const promptText = promptInput.value;
            if (!promptText) return;

            logStatus(`Sending prompt: "${promptText}"`);
            if (dataChannel && dataChannel.readyState === 'open') {
                try {
                    // Daydream Scope expects prompts array with weight 100.0
                    const payload = JSON.stringify({ 
                        prompt: promptText,
                        prompts: [{ text: promptText, weight: 100.0 }]
                    });
                    dataChannel.send(payload);
                    logStatus(`Prompt sent via Data Channel 'parameters'. Payload: ${payload}`);
                } catch (error) {
                    logStatus(`Error sending prompt via Data Channel: ${error.message}`, true);
                }
            } else {
                logStatus('Data channel not open. Ensure stream is connected.', true);
            }
            promptInput.value = '';
        }

        connectStreamBtn.addEventListener('click', connectStream);
        disconnectBtn.addEventListener('click', disconnect);
        sendPromptBtn.addEventListener('click', sendPrompt);
        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendPrompt();
        });

    </script>
</body>
</html>
